# 放入 my-ui 容器后生效。证书需先放入容器：docker cp 证书到 my-ui:/etc/nginx/certs/，见 docs/SSL-CERT-HANDOFF.md
# 需将 handoff.itsokthen.com 解析到本机
server {
    listen 443 ssl;
    server_name handoff.itsokthen.com;

    ssl_certificate /etc/nginx/certs/handoff-fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/handoff-privkey.pem;
    ssl_session_timeout 5m;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://172.17.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
server {
    listen 80;
    server_name handoff.itsokthen.com;
    return 301 https://$server_name$request_uri;
}
