<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HANDOFF 看板</title>
  <style>
    :root {
      --bg: #0f0f12; --card: #1a1a1f; --text: #e4e4e7; --muted: #71717a; --border: #27272a;
      --待办: #3b82f6; --进行中: #eab308; --待审核: #f97316; --需修改: #ef4444; --已完成: #22c55e;
      --accent: #8b5cf6; --product-accent: #06b6d4; --agent-accent: #f59e0b;
    }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.5; }

    .nav {
      position: sticky; top: 0; z-index: 20;
      background: var(--card); border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 2px; padding: 8px;
      justify-content: center;
    }
    .nav a {
      padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
      color: var(--muted); text-decoration: none;
    }
    .nav a:hover { color: var(--text); background: rgba(255,255,255,.06); }
    .nav a.active { color: var(--accent); background: rgba(139,92,246,.15); }

    .page { display: none; max-width: 760px; margin: 0 auto; padding: 28px 20px 56px; }
    .page.active { display: block; }
    .page-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 10px; }
    .page-desc { font-size: 0.95rem; color: var(--muted); margin-bottom: 28px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
    .badge.待办 { background: rgba(59,130,246,.2); color: var(--待办); }
    .badge.进行中 { background: rgba(234,179,8,.2); color: var(--进行中); }
    .badge.待审核 { background: rgba(249,115,22,.2); color: var(--待审核); }
    .badge.需修改 { background: rgba(239,68,68,.2); color: var(--需修改); }
    .badge.已完成 { background: rgba(34,197,94,.2); color: var(--已完成); }

    /* 概览页：统计卡片 */
    .overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
    .stat-num { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.85rem; color: var(--muted); margin-top: 6px; }
    .overview-recent { font-size: 0.95rem; color: var(--muted); }
    .overview-recent li { margin: 8px 0; }

    /* Phase 进度条 */
    .phase-progress-list { margin-bottom: 28px; }
    .phase-progress-item { display: flex; flex-direction: column; margin-bottom: 16px; }
    .phase-progress-item:last-child { margin-bottom: 0; }
    .phase-progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .phase-progress-label { font-size: 0.9rem; font-weight: 500; }
    .phase-progress-bar { height: 8px; background: rgba(255,255,255,.05); border-radius: 4px; overflow: hidden; }
    .phase-progress-fill { height: 100%; transition: width 0.3s ease; }

    /* 当前待办精简列表 */
    .current-tasks-compact { list-style: none; padding: 0; margin: 0; }
    .current-tasks-compact li { padding: 12px 0; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
    .current-tasks-compact li:last-child { border-bottom: none; }
    .current-tasks-compact .task-assignee { font-weight: 600; color: var(--accent); min-width: 80px; }
    .current-tasks-compact .task-desc { flex: 1; color: var(--text); }

    /* 产品/Agent 页：阅读版式 */
    .doc-block { margin-bottom: 32px; }
    .doc-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 10px; font-weight: 600; }
    .doc-value { font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; line-height: 1.7; }
    #page-product .doc-label { color: var(--product-accent); }
    #page-agent .doc-label { color: var(--agent-accent); }

    /* 待办页：表格式 */
    #page-tasks table { width: 100%; border-collapse: collapse; }
    #page-tasks th, #page-tasks td { text-align: left; padding: 14px 10px; border-bottom: 1px solid var(--border); }
    #page-tasks th { font-size: 0.85rem; color: var(--muted); font-weight: 600; }
    #page-tasks .assignee { color: var(--accent); font-weight: 600; }

    /* Phases 页：卡片列表，每 Phase 独立卡片 */
    #page-phases .phase-card { margin-bottom: 24px; }
    #page-phases .phase-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    #page-phases .phase-id { font-weight: 600; font-size: 1.1rem; }
    #page-phases .phase-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 0.9rem; color: var(--muted); margin-bottom: 14px; }
    #page-phases .phase-assignee { font-weight: 500; }
    #page-phases .phase-pr-btn { display: inline-block; padding: 4px 12px; background: rgba(129,140,248,.15); color: #818cf8; border-radius: 6px; font-size: 0.85rem; font-weight: 500; text-decoration: none; }
    #page-phases .phase-pr-btn:hover { background: rgba(129,140,248,.25); }
    #page-phases .phase-progress { margin-bottom: 14px; }
    #page-phases .phase-progress-text { font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
    #page-phases .phase-progress-bar { height: 6px; background: rgba(255,255,255,.05); border-radius: 3px; overflow: hidden; }
    #page-phases .phase-progress-fill { height: 100%; background: var(--已完成); transition: width 0.3s ease; }
    #page-phases .phase-tasks { list-style: none; padding: 0; margin: 0; }
    #page-phases .phase-tasks li { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 0.95rem; }
    #page-phases .phase-tasks li:last-child { border-bottom: none; }
    #page-phases .phase-tasks .done { color: var(--muted); }
    #page-phases .phase-tasks .tick { color: var(--已完成); }

    /* 更新日志页：时间线 */
    #page-log .timeline { position: relative; padding-left: 24px; border-left: 2px solid var(--border); margin-left: 10px; }
    #page-log .timeline-item { position: relative; padding-bottom: 24px; }
    #page-log .timeline-item::before { content: ''; position: absolute; left: -28px; top: 6px; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); }
    #page-log .timeline-date { font-weight: 600; color: var(--accent); font-size: 0.95rem; margin-bottom: 6px; }
    #page-log .timeline-msg { font-size: 0.95rem; color: var(--text); line-height: 1.6; }

    /* 启动指令页：代码块式 */
    #page-launch .launch-block { margin-bottom: 28px; }
    #page-launch .launch-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 10px; color: var(--accent); }
    #page-launch .launch-body { background: #0d0d0f; border: 1px solid var(--border); border-radius: 8px; padding: 18px; font-family: ui-monospace, monospace; font-size: 0.85rem; white-space: pre-wrap; word-break: break-word; overflow-x: auto; line-height: 1.6; }

    .loading, .error { text-align: center; padding: 48px 16px; color: var(--muted); }
    .error { color: var(--需修改); }
    a { color: #818cf8; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* 响应式 */
    @media (max-width: 640px) {
      .overview-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .page { padding: 20px 14px 40px; }
      .card { padding: 18px; }
      .phase-progress-item { flex-direction: column; align-items: flex-start; gap: 8px; }
      .phase-progress-bar { width: 100%; }
      #page-tasks .tasks-table-wrap { overflow-x: auto; }
      #page-tasks table { font-size: 0.85rem; }
      #page-tasks thead { display: none; }
      #page-tasks tbody tr { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; padding: 12px; gap: 6px; }
      #page-tasks tbody tr:last-child { margin-bottom: 0; }
      #page-tasks td { padding: 4px 0; border: none; display: flex; flex-direction: column; gap: 2px; }
      #page-tasks td::before { content: attr(data-label); font-size: 0.75rem; color: var(--muted); font-weight: 600; }
      #page-phases .phase-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="#overview" data-page="overview">概览</a>
    <a href="#product" data-page="product">产品</a>
    <a href="#agent" data-page="agent">Agent</a>
    <a href="#tasks" data-page="tasks">待办</a>
    <a href="#phases" data-page="phases">Phases</a>
    <a href="#log" data-page="log">更新日志</a>
    <a href="#launch" data-page="launch">启动指令</a>
  </nav>
  <div id="root" class="loading">加载中…</div>

  <script>
    const API = '';
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function escapeAttr(s) { return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    function render(data) {
      const metaLabels = { vision_quote: '产品愿景（引用）', vision_summary: '愿景摘要', design_refs: '设计参考', agent_roles: 'Agent 分工', completion_workflow: '完工流程', current_state: '当前状态', iteration_priority: '迭代优先级', launch_cmd_help: '启动命令说明' };
      const metaOrder = ['vision_quote', 'vision_summary', 'design_refs', 'agent_roles', 'completion_workflow', 'current_state', 'iteration_priority', 'launch_cmd_help'];
      const meta = data.meta || {};
      const tasks = data.current_tasks || [];
      const phaseOrder = (a, b) => { const o = ['F', 'D-1', 'D-2', 'E-1', 'E-2']; return (o.indexOf(a.phase_id) + 1) - (o.indexOf(b.phase_id) + 1) || 0; };
      const phases = (data.phases || []).slice().sort(phaseOrder);
      const log = data.completion_log || [];
      const launch = data.launch_instructions || [];

      const root = document.getElementById('root');
      root.innerHTML = '';

      const overview = document.createElement('div');
      overview.id = 'page-overview'; overview.className = 'page active';
      const taskCount = tasks.length;
      const doneCount = phases.reduce((n, p) => n + (p.status === '已完成' ? 1 : 0), 0);
      const completionRate = phases.length > 0 ? Math.round((doneCount / phases.length) * 100) : 0;
      
      let overviewHtml = '<div class="page-title">概览</div><div class="page-desc">HANDOFF 状态一览</div>';
      
      overviewHtml += '<div class="overview-grid">' +
        '<div class="stat-card"><div class="stat-num">' + taskCount + '</div><div class="stat-label">当前待办</div></div>' +
        '<div class="stat-card"><div class="stat-num">' + phases.length + '</div><div class="stat-label">Phases</div></div>' +
        '<div class="stat-card"><div class="stat-num">' + doneCount + '</div><div class="stat-label">已完成</div></div>' +
        '<div class="stat-card"><div class="stat-num">' + completionRate + '%</div><div class="stat-label">完成率</div></div>' +
        '</div>';
      
      overviewHtml += '<div class="card"><div style="font-size:1.1rem;font-weight:600;margin-bottom:16px">Phase 进度</div><div class="phase-progress-list">';
      phases.forEach(p => {
        const statusColor = p.status === '已完成' ? 'var(--已完成)' : p.status === '进行中' ? 'var(--进行中)' : p.status === '待审核' ? 'var(--待审核)' : p.status === '需修改' ? 'var(--需修改)' : 'var(--待办)';
        const tasksDone = (p.tasks || []).filter(t => t.done).length;
        const tasksTotal = (p.tasks || []).length;
        const phaseProgress = tasksTotal > 0 ? Math.round((tasksDone / tasksTotal) * 100) : 0;
        overviewHtml += '<div class="phase-progress-item">' +
          '<div class="phase-progress-header">' +
          '<span class="phase-progress-label">' + escapeHtml(p.phase_id) + ' · ' + escapeHtml(p.title || '') + '</span>' +
          '<span class="badge ' + escapeAttr(p.status) + '">' + escapeHtml(p.status) + '</span>' +
          '</div>' +
          '<div class="phase-progress-bar"><div class="phase-progress-fill" style="width:' + phaseProgress + '%;background:' + statusColor + '"></div></div>' +
          '</div>';
      });
      overviewHtml += '</div></div>';
      
      if (tasks.length > 0) {
        overviewHtml += '<div class="card"><div style="font-size:1.1rem;font-weight:600;margin-bottom:16px">当前待办</div><ul class="current-tasks-compact">';
        tasks.slice(0, 3).forEach(t => {
          overviewHtml += '<li><span class="task-assignee">' + escapeHtml(t.assignee || '—') + '</span><span class="task-desc">' + escapeHtml(t.task_desc) + '</span></li>';
        });
        if (tasks.length > 3) {
          overviewHtml += '<li style="color:var(--muted);font-size:0.9rem;padding-top:8px"><a href="#tasks" style="color:var(--accent)">查看全部 ' + tasks.length + ' 项待办 →</a></li>';
        }
        overviewHtml += '</ul></div>';
      }
      
      overviewHtml += '<div class="card"><div style="font-size:1.1rem;font-weight:600;margin-bottom:16px">最近更新</div><ul class="overview-recent">' +
        log.slice(0, 5).map(l => '<li><strong>' + escapeHtml(l.date) + '</strong> ' + escapeHtml(l.message.slice(0, 80)) + (l.message.length > 80 ? '…' : '') + '</li>').join('') +
        '</ul></div>';
      
      overview.innerHTML = overviewHtml;
      root.appendChild(overview);

      // Product page
      const productPage = document.createElement('div');
      productPage.id = 'page-product'; productPage.className = 'page';
      const productKeys = ['vision_quote', 'vision_summary', 'design_refs', 'iteration_priority'];
      let productHtml = '<div class="page-title">产品</div><div class="page-desc">产品愿景与迭代规划</div>';
      productKeys.forEach(key => {
        if (!meta[key]) return;
        productHtml += '<div class="card doc-block"><div class="doc-label">' + escapeHtml(metaLabels[key] || key) + '</div><div class="doc-value">' + escapeHtml(meta[key]) + '</div></div>';
      });
      productPage.innerHTML = productHtml;
      root.appendChild(productPage);

      // Agent page
      const agentPage = document.createElement('div');
      agentPage.id = 'page-agent'; agentPage.className = 'page';
      const agentKeys = ['agent_roles', 'completion_workflow', 'current_state', 'launch_cmd_help'];
      let agentHtml = '<div class="page-title">Agent</div><div class="page-desc">Agent 分工、流程与状态</div>';
      agentKeys.forEach(key => {
        if (!meta[key]) return;
        agentHtml += '<div class="card doc-block"><div class="doc-label">' + escapeHtml(metaLabels[key] || key) + '</div><div class="doc-value">' + escapeHtml(meta[key]) + '</div></div>';
      });
      agentPage.innerHTML = agentHtml;
      root.appendChild(agentPage);

      const tasksPage = document.createElement('div');
      tasksPage.id = 'page-tasks'; tasksPage.className = 'page';
      let tableHtml = '<div class="page-title">当前待办</div><div class="page-desc">负责、任务与启动命令</div><div class="card tasks-table-wrap"><table><thead><tr><th>负责</th><th>任务</th><th>启动命令</th></tr></thead><tbody>';
      tasks.forEach(t => { tableHtml += '<tr><td class="assignee" data-label="负责">' + escapeHtml(t.assignee || '—') + '</td><td data-label="任务">' + escapeHtml(t.task_desc) + '</td><td data-label="启动命令" style="color:var(--muted);font-size:0.85rem">' + escapeHtml(t.launch_cmd || '') + '</td></tr>'; });
      tasksPage.innerHTML = tableHtml + '</tbody></table></div>';
      root.appendChild(tasksPage);

      const phasesPage = document.createElement('div');
      phasesPage.id = 'page-phases'; phasesPage.className = 'page';
      let phasesHtml = '<div class="page-title">Phases</div><div class="page-desc">迭代阶段与子项</div>';
      phases.forEach(p => {
        const phaseTasks = p.tasks || [];
        const tasksDone = phaseTasks.filter(t => t.done).length;
        const tasksTotal = phaseTasks.length;
        const phaseProgress = tasksTotal > 0 ? Math.round((tasksDone / tasksTotal) * 100) : 0;
        const tasksList = phaseTasks.map(t => '<li class="' + (t.done ? 'done' : '') + '"><span class="' + (t.done ? 'tick">✓' : '') + '"></span> ' + escapeHtml(t.content) + '</li>').join('');
        const prBtn = p.pr_url ? '<a href="' + escapeAttr(p.pr_url) + '" target="_blank" rel="noopener" class="phase-pr-btn">PR</a>' : '';
        const metaRow = '<div class="phase-meta">' + (p.assignee ? '<span class="phase-assignee">' + escapeHtml(p.assignee) + '</span>' : '') + prBtn + '</div>';
        const progressBar = tasksTotal > 0 ? '<div class="phase-progress"><div class="phase-progress-text">' + tasksDone + ' / ' + tasksTotal + ' 完成 (' + phaseProgress + '%)</div><div class="phase-progress-bar"><div class="phase-progress-fill" style="width:' + phaseProgress + '%"></div></div></div>' : '';
        phasesHtml += '<div class="card phase-card"><div class="phase-head"><span class="phase-id">' + escapeHtml(p.phase_id) + ' · ' + escapeHtml(p.title || '') + '</span><span class="badge ' + escapeAttr(p.status) + '">' + escapeHtml(p.status) + '</span></div>' + metaRow + progressBar + '<ul class="phase-tasks">' + (tasksList || '<li style="color:var(--muted)">无子项</li>') + '</ul></div>';
      });
      phasesPage.innerHTML = phasesHtml;
      root.appendChild(phasesPage);

      const logPage = document.createElement('div');
      logPage.id = 'page-log'; logPage.className = 'page';
      logPage.innerHTML = '<div class="page-title">更新日志</div><div class="page-desc">按时间倒序</div><div class="card"><div class="timeline">' +
        log.map(l => '<div class="timeline-item"><div class="timeline-date">' + escapeHtml(l.date) + '</div><div class="timeline-msg">' + escapeHtml(l.message) + '</div></div>').join('') +
        '</div></div>';
      root.appendChild(logPage);

      const launchPage = document.createElement('div');
      launchPage.id = 'page-launch'; launchPage.className = 'page';
      launchPage.innerHTML = '<div class="page-title">启动指令</div><div class="page-desc">复制到 Composer 或 run_agent 使用</div>' +
        launch.map(li => '<div class="card launch-block"><div class="launch-title">' + escapeHtml(li.agent_type) + '</div><pre class="launch-body">' + escapeHtml(li.body) + '</pre></div>').join('');
      root.appendChild(launchPage);

      const hash = (location.hash || '#overview').slice(1) || 'overview';
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav a').forEach(a => { a.classList.toggle('active', a.getAttribute('data-page') === hash); });
      const pageEl = document.getElementById('page-' + hash);
      if (pageEl) pageEl.classList.add('active');
    }

    function onHashChange() {
      let hash = (location.hash || '#overview').slice(1) || 'overview';
      if (hash === 'docs') { location.hash = 'product'; return; }
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav a').forEach(a => { a.classList.toggle('active', a.getAttribute('data-page') === hash); });
      const pageEl = document.getElementById('page-' + hash);
      if (pageEl) pageEl.classList.add('active');
    }
    window.addEventListener('hashchange', onHashChange);

    fetch(API + '/handoff')
      .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
      .then(data => { document.getElementById('root').classList.remove('loading'); render(data); onHashChange(); })
      .catch(e => { document.getElementById('root').innerHTML = '<div class="error">加载失败：' + escapeHtml(e.message) + '</div>'; document.getElementById('root').classList.remove('loading'); });
  </script>
</body>
</html>
