<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HANDOFF 看板</title>
  <style>
    :root {
      --bg: #f6f8fa; --card: #ffffff; --text: #24292f; --muted: #57606a; --border: #d0d7de;
      --待办: #24292f; --进行中: #bf8700; --待审核: #cf222e; --需修改: #cf222e; --已完成: #1a7f37;
      --accent: #24292f; --product-accent: #24292f; --agent-accent: #8250df;
    }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.5; }

    .nav {
      position: sticky; top: 0; z-index: 20;
      background: var(--card); border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 2px; padding: 8px 16px;
      justify-content: center;
    }
    .nav a {
      padding: 6px 14px; border-radius: 6px; font-size: 0.875rem; font-weight: 500;
      color: var(--muted); text-decoration: none;
    }
    .nav a:hover { color: var(--text); background: #f6f8fa; }
    .nav a.active { color: var(--accent); background: rgba(36,41,47,.08); }

    .page { display: none; max-width: 896px; margin: 0 auto; padding: 24px 16px 48px; }
    .page.active { display: block; }
    .page-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
    .page-desc { font-size: 0.875rem; color: var(--muted); margin-bottom: 24px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .badge { display: inline-block; padding: 0 7px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
    .badge.待办 { background: #eaeef2; color: #24292f; }
    .badge.进行中 { background: #fff8c5; color: #9a6700; }
    .badge.待审核 { background: #ffebe9; color: #cf222e; }
    .badge.需修改 { background: #ffebe9; color: #cf222e; }
    .badge.已完成 { background: #dafbe1; color: #1a7f37; }

    .overview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 16px; text-align: center; }
    .stat-num { font-size: 1.75rem; font-weight: 600; color: var(--accent); }
    .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    .overview-recent { font-size: 0.875rem; color: var(--muted); }
    .overview-recent li { margin: 8px 0; }

    .phase-progress-list { margin-bottom: 24px; }
    .phase-progress-item { margin-bottom: 12px; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; }
    .phase-progress-item:last-child { margin-bottom: 0; }
    .phase-progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .phase-progress-label { font-size: 0.875rem; font-weight: 600; color: var(--text); }
    .phase-progress-bar { height: 3px; background: #eaeef2; border-radius: 2px; overflow: hidden; }
    .phase-progress-fill { height: 100%; border-radius: 2px; transition: width 0.2s; }

    .current-tasks-compact { list-style: none; padding: 0; margin: 0; }
    .current-tasks-compact li { padding: 12px 0; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
    .current-tasks-compact li:last-child { border-bottom: none; }
    .current-tasks-compact .task-assignee { font-weight: 600; color: var(--accent); min-width: 80px; font-size: 0.875rem; }
    .current-tasks-compact .task-desc { flex: 1; font-size: 0.875rem; }

    .doc-block { margin-bottom: 24px; }
    .doc-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
    .doc-value { font-size: 0.875rem; white-space: pre-wrap; word-break: break-word; line-height: 1.6; }
    #page-product .doc-label { color: var(--product-accent); }
    #page-agent .doc-label { color: var(--agent-accent); }

    .md-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .md-table th, .md-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .md-table th { background: #f6f8fa; font-weight: 600; color: var(--text); }
    .md-table tr:last-child td { border-bottom: none; }
    .md-table code { background: rgba(175,184,193,.2); padding: 2px 6px; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, monospace; }

    .state-sections { display: flex; flex-direction: column; gap: 28px; }
    .state-section { border: 1px solid var(--border); border-radius: 8px; padding: 24px; background: var(--card); }
    .state-section-title { font-size: 1.25rem; font-weight: 600; margin: 0 0 20px 0; padding-bottom: 12px; border-bottom: 2px solid var(--border); color: var(--text); }
    .state-ios .state-section-title { border-color: #24292f; color: #24292f; }
    .state-backend .state-section-title { border-color: #1a7f37; color: #1a7f37; }
    .state-abandoned .state-section-title { border-color: var(--muted); color: var(--muted); }
    .state-section-repo { font-size: 0.8em; font-weight: 500; font-family: ui-monospace, monospace; color: var(--muted); margin-left: 8px; }
    .state-subsection { margin-bottom: 20px; }
    .state-subsection:last-child { margin-bottom: 0; }
    .state-subsection-label { font-size: 0.875rem; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    .state-item-list { margin: 0; padding: 0; list-style: none; font-size: 0.9375rem; line-height: 2; color: var(--text); }
    .state-item-list li { padding-left: 18px; position: relative; }
    .state-item-list li::before { content: '•'; position: absolute; left: 0; color: var(--muted); font-size: 0.75em; }

    #page-tasks table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    #page-tasks th, #page-tasks td { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    #page-tasks th { font-size: 0.75rem; color: var(--muted); font-weight: 600; background: #f6f8fa; }
    #page-tasks .assignee { color: var(--accent); font-weight: 600; }

    #page-phases .phase-card { margin-bottom: 16px; border: 1px solid var(--border); }
    #page-phases .phase-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    #page-phases .phase-id { font-weight: 600; font-size: 1rem; }
    #page-phases .phase-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 0.8125rem; color: var(--muted); margin-bottom: 12px; }
    #page-phases .phase-assignee { font-weight: 500; color: var(--agent-accent); }
    #page-phases .phase-pr-btn { display: inline-block; padding: 4px 12px; background: #238636; color: #fff !important; border-radius: 6px; font-size: 0.75rem; font-weight: 500; text-decoration: none; }
    #page-phases .phase-pr-btn:hover { background: #2ea043; }
    #page-phases .phase-progress { margin-bottom: 12px; }
    #page-phases .phase-progress-text { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
    #page-phases .phase-progress-bar { height: 3px; background: #eaeef2; border-radius: 2px; overflow: hidden; }
    #page-phases .phase-progress-fill { height: 100%; border-radius: 2px; transition: width 0.2s; }
    #page-phases .phase-tasks { list-style: none; padding: 0; margin: 0; }
    #page-phases .phase-tasks li { padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 0.875rem; }
    #page-phases .phase-tasks li:last-child { border-bottom: none; }
    #page-phases .phase-tasks .done { color: var(--muted); text-decoration: line-through; }
    #page-phases .phase-tasks .tick { color: var(--已完成); }

    #page-log .timeline { position: relative; padding-left: 20px; border-left: 2px solid var(--border); margin-left: 8px; }
    #page-log .timeline-item { position: relative; padding-bottom: 16px; }
    #page-log .timeline-item::before { content: ''; position: absolute; left: -24px; top: 4px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    #page-log .timeline-date { font-weight: 600; color: var(--accent); font-size: 0.8125rem; margin-bottom: 4px; }
    #page-log .timeline-msg { font-size: 0.875rem; line-height: 1.5; }

    #page-launch .launch-block { margin-bottom: 24px; }
    #page-launch .launch-title { font-size: 0.875rem; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
    #page-launch .launch-body { background: #f6f8fa; border: 1px solid var(--border); border-radius: 6px; padding: 16px; font-family: ui-monospace, monospace; font-size: 0.8125rem; white-space: pre-wrap; word-break: break-word; overflow-x: auto; line-height: 1.5; }

    .loading, .error { text-align: center; padding: 48px 16px; color: var(--muted); }
    .error { color: #cf222e; }
    a { color: #24292f; text-decoration: none; }
    a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .overview-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .page { padding: 20px 14px 40px; }
      .card { padding: 18px; }
      .phase-progress-item { flex-direction: column; align-items: flex-start; gap: 8px; }
      .phase-progress-bar { width: 100%; }
      #page-tasks .tasks-table-wrap { overflow-x: auto; }
      #page-tasks table { font-size: 0.8125rem; }
      #page-tasks thead { display: none; }
      #page-tasks tbody tr { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; padding: 12px; gap: 4px; }
      #page-tasks tbody tr:last-child { margin-bottom: 0; }
      #page-tasks td { padding: 4px 0; border: none; display: flex; flex-direction: column; gap: 2px; }
      #page-tasks td::before { content: attr(data-label); font-size: 0.75rem; color: var(--muted); font-weight: 600; }
      #page-phases .phase-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="#overview" data-page="overview">概览</a>
    <a href="#product" data-page="product">产品</a>
    <a href="#agent" data-page="agent">Agent</a>
    <a href="#tasks" data-page="tasks">待办</a>
    <a href="#phases" data-page="phases">Phases</a>
    <a href="#log" data-page="log">更新日志</a>
    <a href="#launch" data-page="launch">启动指令</a>
  </nav>
  <div id="root" class="loading">加载中…</div>

  <script>
    const API = '';
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function escapeAttr(s) { return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    function parseMarkdownTable(text) {
      const lines = text.trim().split('\n').filter(l => l.trim());
      if (lines.length < 2) return null;
      const header = lines[0];
      const sep = lines[1];
      if (!/^\|.+\|$/.test(header) || !/^[\s\-|:]+$/.test(sep)) return null;
      const formatCell = (c) => c.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`([^`]+)`/g, '<code>$1</code>');
      const cells = (row) => row.split('|').slice(1, -1).map(c => formatCell(c.trim()));
      const headers = cells(header);
      let html = '<table class="md-table"><thead><tr>';
      headers.forEach(h => { html += '<th>' + h + '</th>'; });
      html += '</tr></thead><tbody>';
      for (let i = 2; i < lines.length; i++) {
        const vals = cells(lines[i]);
        if (vals.some(v => v)) {
          html += '<tr>';
          vals.forEach(v => { html += '<td>' + v + '</td>'; });
          html += '</tr>';
        }
      }
      html += '</tbody></table>';
      return html;
    }

    function renderRepoCommits(repoCommits) {
      if (!repoCommits || typeof repoCommits !== 'object') return '<div class="doc-value" style="color:var(--muted)">无数据</div>';
      const repos = Object.keys(repoCommits);
      if (repos.length === 0) return '<div class="doc-value" style="color:var(--muted)">无数据</div>';
      let html = '<div class="state-sections">';
      repos.forEach(repo => {
        const commits = repoCommits[repo] || [];
        html += '<div class="state-section"><h4 class="state-section-title"><span class="state-section-repo">' + escapeHtml(repo) + '</span></h4>';
        html += '<ul class="state-item-list">';
        commits.forEach(c => {
          const msg = (c.message || '').slice(0, 120) + ((c.message || '').length > 120 ? '…' : '');
          const shaLink = c.url ? '<a href="' + escapeAttr(c.url) + '" target="_blank" rel="noopener" style="font-size:0.8em;color:var(--muted)">' + escapeHtml(c.sha || '') + '</a>' : escapeHtml(c.sha || '');
          html += '<li>' + shaLink + ' ' + escapeHtml(msg) + '</li>';
        });
        html += '</ul></div>';
      });
      html += '</div>';
      return html;
    }

    function renderDocValue(key, text) {
      if (key === 'agent_roles' || key === 'iteration_priority') {
        const table = parseMarkdownTable(text);
        if (table) return table;
      }
      return '<div class="doc-value">' + escapeHtml(text || '') + '</div>';
    }

    function render(data) {
      const metaLabels = { vision_quote: '产品愿景（引用）', vision_summary: '愿景摘要', design_refs: '设计参考', agent_roles: 'Agent 分工', completion_workflow: '完工流程', current_state: '当前状态', iteration_priority: '迭代优先级', launch_cmd_help: '启动命令说明' };
      const metaOrder = ['vision_quote', 'vision_summary', 'design_refs', 'agent_roles', 'completion_workflow', 'current_state', 'iteration_priority', 'launch_cmd_help'];
      const meta = data.meta || {};
      const tasks = data.current_tasks || [];
      const phaseOrder = (a, b) => { const o = ['F', 'D-1', 'D-2', 'E-1', 'E-2']; return (o.indexOf(a.phase_id) + 1) - (o.indexOf(b.phase_id) + 1) || 0; };
      const phases = (data.phases || []).slice().sort(phaseOrder);
      const log = data.completion_log || [];
      const launch = data.launch_instructions || [];

      const root = document.getElementById('root');
      root.innerHTML = '';

      const overview = document.createElement('div');
      overview.id = 'page-overview'; overview.className = 'page active';
      const taskCount = tasks.length;
      const doneCount = phases.reduce((n, p) => n + (p.status === '已完成' ? 1 : 0), 0);
      const completionRate = phases.length > 0 ? Math.round((doneCount / phases.length) * 100) : 0;
      
      let overviewHtml = '<div class="page-title">概览</div><div class="page-desc">HANDOFF 状态一览</div>';
      
      overviewHtml += '<div class="overview-grid">' +
        '<div class="stat-card"><div class="stat-num">' + taskCount + '</div><div class="stat-label">当前待办</div></div>' +
        '<div class="stat-card"><div class="stat-num">' + phases.length + '</div><div class="stat-label">Phases</div></div>' +
        '<div class="stat-card"><div class="stat-num">' + doneCount + '</div><div class="stat-label">已完成</div></div>' +
        '<div class="stat-card"><div class="stat-num">' + completionRate + '%</div><div class="stat-label">完成率</div></div>' +
        '</div>';
      
      overviewHtml += '<div class="card"><div style="font-size:1.1rem;font-weight:600;margin-bottom:16px">Phase 进度</div><div class="phase-progress-list">';
      phases.forEach(p => {
        const statusColor = p.status === '已完成' ? 'var(--已完成)' : p.status === '进行中' ? 'var(--进行中)' : p.status === '待审核' ? 'var(--待审核)' : p.status === '需修改' ? 'var(--需修改)' : 'var(--待办)';
        const tasksDone = (p.tasks || []).filter(t => t.done).length;
        const tasksTotal = (p.tasks || []).length;
        const phaseProgress = tasksTotal > 0 ? Math.round((tasksDone / tasksTotal) * 100) : 0;
        overviewHtml += '<div class="phase-progress-item">' +
          '<div class="phase-progress-header">' +
          '<span class="phase-progress-label">' + escapeHtml(p.phase_id) + ' · ' + escapeHtml(p.title || '') + '</span>' +
          '<span class="badge ' + escapeAttr(p.status) + '">' + escapeHtml(p.status) + '</span>' +
          '</div>' +
          '<div class="phase-progress-bar"><div class="phase-progress-fill" style="width:' + phaseProgress + '%;background:' + statusColor + '"></div></div>' +
          '</div>';
      });
      overviewHtml += '</div></div>';
      
      if (tasks.length > 0) {
        overviewHtml += '<div class="card"><div style="font-size:1.1rem;font-weight:600;margin-bottom:16px">当前待办</div><ul class="current-tasks-compact">';
        tasks.slice(0, 3).forEach(t => {
          overviewHtml += '<li><span class="task-assignee">' + escapeHtml(t.assignee || '—') + '</span><span class="task-desc">' + escapeHtml(t.task_desc) + '</span></li>';
        });
        if (tasks.length > 3) {
          overviewHtml += '<li style="color:var(--muted);font-size:0.9rem;padding-top:8px"><a href="#tasks" style="color:var(--accent)">查看全部 ' + tasks.length + ' 项待办 →</a></li>';
        }
        overviewHtml += '</ul></div>';
      }
      
      overviewHtml += '<div class="card"><div style="font-size:1.1rem;font-weight:600;margin-bottom:16px">最近更新</div><ul class="overview-recent">' +
        log.slice(0, 5).map(l => '<li><strong>' + escapeHtml(l.date) + '</strong> ' + escapeHtml(l.message.slice(0, 80)) + (l.message.length > 80 ? '…' : '') + '</li>').join('') +
        '</ul></div>';
      
      overview.innerHTML = overviewHtml;
      root.appendChild(overview);

      // Product page
      const productPage = document.createElement('div');
      productPage.id = 'page-product'; productPage.className = 'page';
      const productKeys = ['vision_quote', 'vision_summary', 'design_refs', 'iteration_priority'];
      let productHtml = '<div class="page-title">产品</div><div class="page-desc">产品愿景与迭代规划</div>';
      productKeys.forEach(key => {
        if (!meta[key]) return;
        productHtml += '<div class="card doc-block"><div class="doc-label">' + escapeHtml(metaLabels[key] || key) + '</div>' + renderDocValue(key, meta[key]) + '</div>';
      });
      productPage.innerHTML = productHtml;
      root.appendChild(productPage);

      // Agent page
      const agentPage = document.createElement('div');
      agentPage.id = 'page-agent'; agentPage.className = 'page';
      const agentKeys = ['agent_roles', 'completion_workflow', 'launch_cmd_help'];
      let agentHtml = '<div class="page-title">Agent</div><div class="page-desc">Agent 分工、流程与各 Repo 最近提交</div>';
      agentKeys.forEach(key => {
        if (!meta[key]) return;
        agentHtml += '<div class="card doc-block"><div class="doc-label">' + escapeHtml(metaLabels[key] || key) + '</div>' + renderDocValue(key, meta[key]) + '</div>';
      });
      agentHtml += '<div class="card doc-block"><div class="doc-label">各 Repo 最近提交</div>' + renderRepoCommits(data.repo_commits || {}) + '</div>';
      agentPage.innerHTML = agentHtml;
      root.appendChild(agentPage);

      const tasksPage = document.createElement('div');
      tasksPage.id = 'page-tasks'; tasksPage.className = 'page';
      let tableHtml = '<div class="page-title">当前待办</div><div class="page-desc">负责、任务与启动命令</div><div class="card tasks-table-wrap"><table><thead><tr><th>负责</th><th>任务</th><th>启动命令</th></tr></thead><tbody>';
      tasks.forEach(t => { tableHtml += '<tr><td class="assignee" data-label="负责">' + escapeHtml(t.assignee || '—') + '</td><td data-label="任务">' + escapeHtml(t.task_desc) + '</td><td data-label="启动命令" style="color:var(--muted);font-size:0.85rem">' + escapeHtml(t.launch_cmd || '') + '</td></tr>'; });
      tasksPage.innerHTML = tableHtml + '</tbody></table></div>';
      root.appendChild(tasksPage);

      const phasesPage = document.createElement('div');
      phasesPage.id = 'page-phases'; phasesPage.className = 'page';
      let phasesHtml = '<div class="page-title">Phases</div><div class="page-desc">迭代阶段与子项</div>';
      phases.forEach(p => {
        const phaseTasks = p.tasks || [];
        const tasksDone = phaseTasks.filter(t => t.done).length;
        const tasksTotal = phaseTasks.length;
        const phaseProgress = tasksTotal > 0 ? Math.round((tasksDone / tasksTotal) * 100) : 0;
        const tasksList = phaseTasks.map(t => '<li class="' + (t.done ? 'done' : '') + '"><span class="' + (t.done ? 'tick">✓' : '') + '"></span> ' + escapeHtml(t.content) + '</li>').join('');
        const prBtn = p.pr_url ? '<a href="' + escapeAttr(p.pr_url) + '" target="_blank" rel="noopener" class="phase-pr-btn">PR</a>' : '';
        const metaRow = '<div class="phase-meta">' + (p.assignee ? '<span class="phase-assignee">' + escapeHtml(p.assignee) + '</span>' : '') + prBtn + '</div>';
        const progressBar = tasksTotal > 0 ? '<div class="phase-progress"><div class="phase-progress-text">' + tasksDone + ' / ' + tasksTotal + ' 完成 (' + phaseProgress + '%)</div><div class="phase-progress-bar"><div class="phase-progress-fill" style="width:' + phaseProgress + '%"></div></div></div>' : '';
        phasesHtml += '<div class="card phase-card"><div class="phase-head"><span class="phase-id">' + escapeHtml(p.phase_id) + ' · ' + escapeHtml(p.title || '') + '</span><span class="badge ' + escapeAttr(p.status) + '">' + escapeHtml(p.status) + '</span></div>' + metaRow + progressBar + '<ul class="phase-tasks">' + (tasksList || '<li style="color:var(--muted)">无子项</li>') + '</ul></div>';
      });
      phasesPage.innerHTML = phasesHtml;
      root.appendChild(phasesPage);

      const logPage = document.createElement('div');
      logPage.id = 'page-log'; logPage.className = 'page';
      logPage.innerHTML = '<div class="page-title">更新日志</div><div class="page-desc">按时间倒序</div><div class="card"><div class="timeline">' +
        log.map(l => '<div class="timeline-item"><div class="timeline-date">' + escapeHtml(l.date) + '</div><div class="timeline-msg">' + escapeHtml(l.message) + '</div></div>').join('') +
        '</div></div>';
      root.appendChild(logPage);

      const launchPage = document.createElement('div');
      launchPage.id = 'page-launch'; launchPage.className = 'page';
      launchPage.innerHTML = '<div class="page-title">启动指令</div><div class="page-desc">复制到 Composer 或 run_agent 使用</div>' +
        launch.map(li => '<div class="card launch-block"><div class="launch-title">' + escapeHtml(li.agent_type) + '</div><pre class="launch-body">' + escapeHtml(li.body) + '</pre></div>').join('');
      root.appendChild(launchPage);

      const hash = (location.hash || '#overview').slice(1) || 'overview';
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav a').forEach(a => { a.classList.toggle('active', a.getAttribute('data-page') === hash); });
      const pageEl = document.getElementById('page-' + hash);
      if (pageEl) pageEl.classList.add('active');
    }

    function onHashChange() {
      let hash = (location.hash || '#overview').slice(1) || 'overview';
      if (hash === 'docs') { location.hash = 'product'; return; }
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav a').forEach(a => { a.classList.toggle('active', a.getAttribute('data-page') === hash); });
      const pageEl = document.getElementById('page-' + hash);
      if (pageEl) pageEl.classList.add('active');
    }
    window.addEventListener('hashchange', onHashChange);

    fetch(API + '/handoff')
      .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
      .then(data => { document.getElementById('root').classList.remove('loading'); render(data); onHashChange(); })
      .catch(e => { document.getElementById('root').innerHTML = '<div class="error">加载失败：' + escapeHtml(e.message) + '</div>'; document.getElementById('root').classList.remove('loading'); });
  </script>
</body>
</html>
