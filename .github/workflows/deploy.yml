# handoff-api 部署到自有服务器（push master 时触发）
# 需在仓库 Settings → Secrets 中配置：SERVER_HOST、SERVER_USER、SERVER_SSH_KEY
# 可选：HANDOFF_DATABASE_URL（不设则使用默认 SQLite）
name: Deploy Handoff API

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 上传到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "~/deploy/handoff-api"

      - name: 安装依赖并重启服务
        env:
          HANDOFF_DATABASE_URL: ${{ secrets.HANDOFF_DATABASE_URL }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 2m
          envs: HANDOFF_DATABASE_URL
          script_path: deploy/remote-deploy.sh
